<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Delfín! 🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Para que los delfines no se salgan de la pantalla */
            font-family: 'Comic Sans MS', 'Arial', sans-serif; /* Un toque más divertido */
            background: linear-gradient(to bottom, #87CEEB, #1E90FF); /* Fondo océano */
            color: white;
            text-align: center;
        }

        /* Contenedor principal de la sorpresa (siempre visible) */
        #sorpresa {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        h1 {
            margin-top: 10vh;
            font-size: 3.5rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 10; /* Para que el texto esté siempre encima */
        }

        /* Estilo para Flork */
        #flork {
            max-width: 250px; /* Tamaño del Flork */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            z-index: 9;
            margin-bottom: 5vh;
        }

        .adornos {
            font-size: 2.5rem;
            z-index: 10;
        }

        /* Animación y estilo de los delfines (muchos más y variados) */
        .delfin {
            position: absolute;
            bottom: -150px; /* Empiezan fuera de la pantalla por abajo */
            animation: saltar infinite ease-in-out;
            z-index: 1; /* Los delfines saltan por detrás */
        }

        /* Configuramos 6 delfines con diferentes posiciones, tamaños y tiempos */
        .d1 { left: 5%; font-size: 5rem; animation-duration: 3.5s; animation-delay: 0s; }
        .d2 { left: 25%; font-size: 6.5rem; animation-duration: 4s; animation-delay: 1.5s; }
        .d3 { left: 45%; font-size: 7rem; animation-duration: 4.5s; animation-delay: 0.5s; }
        .d4 { left: 65%; font-size: 5.5rem; animation-duration: 3.8s; animation-delay: 2.2s; }
        .d5 { left: 85%; font-size: 6rem; animation-duration: 4.2s; animation-delay: 1.0s; }
        .d6 { left: 15%; font-size: 4.5rem; animation-duration: 3.2s; animation-delay: 3s; }

        @keyframes saltar {
            0% { transform: translateY(0) rotate(-20deg); }
            50% { transform: translateY(-75vh) rotate(20deg); } /* Altura del salto */
            100% { transform: translateY(0) rotate(-20deg); }
        }
    </style>
</head>
<body>

    <div id="sorpresa">
        <h1>¡Feliz Cumpleaños, Delfín! 🌊</h1>
        
        <img src="flork.png" id="flork" alt="Flork sosteniendo un corazón">

        <div class="adornos">🎈🎉 🎂 🎊 🎈</div>

        <div class="delfin d1">🐬</div>
        <div class="delfin d2">🐬</div>
        <div class="delfin d3">🐬</div>
        <div class="delfin d4">🐬</div>
        <div class="delfin d5">🐬</div>
        <div class="delfin d6">🐬</div>
    </div>

    <script>
        // Función para el confeti automático
        function lanzarConfeti() {
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // Ejecutar confeti al cargar la página
        window.onload = lanzarConfeti;
    </script>
</body>
</html>
